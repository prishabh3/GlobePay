server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/users/**, /api/v1/kyc/**, /api/v1/admin/kyc/**
        - id: wallet-service
          uri: http://${WALLET_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/wallets/**
        - id: transaction-service
          uri: http://${TRANSACTION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/transactions/**
        - id: credit-scoring-service
          uri: http://${CREDIT_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/credit/**
        - id: card-service
          uri: http://${CARD_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/cards/**
        - id: bank-integration-service
          uri: http://${BANK_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/v1/bank/**
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8088
          predicates:
            - Path=/api/v1/notifications/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEdsb2JlUGF5IGF1dGhlbnRpY2F0aW9u}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
